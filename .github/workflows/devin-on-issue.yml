name: Devin on labeled issue

on:
  issues:
    # Subscribe to both 'opened' and 'labeled' so issues created with the label
    # pre-applied also trigger. The API-level dedup guard inside the container
    # prevents duplicate sessions if both events fire for the same issue.
    types: [opened, labeled]

# Serialize per-issue so rapid label toggling can't race to spawn duplicate
# sessions before the API-level dedup check sees the first one. Different
# issues remain parallel.
concurrency:
  group: devin-spawn-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  spawn-devin:
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'devin') ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'devin'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build spawn container
        working-directory: .devin
        run: docker build -t superset-devin-demo:ci .

      - name: Spawn Devin session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          TARGET_REPO: ${{ github.repository }}
          UPSTREAM_REPO: apache/superset
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          docker run --rm \
            -e DEVIN_API_KEY -e DEVIN_ORG_ID \
            -e TARGET_REPO -e UPSTREAM_REPO \
            -e ISSUE_NUMBER -e ISSUE_TITLE -e ISSUE_BODY -e ISSUE_URL \
            -e GITHUB_OUTPUT=/tmp/gh_output \
            -v "$GITHUB_OUTPUT":/tmp/gh_output \
            superset-devin-demo:ci
